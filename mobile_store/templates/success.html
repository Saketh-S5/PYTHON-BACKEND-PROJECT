<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Order Success</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            background: linear-gradient(135deg, #43cea2, #185a9d);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            color: white;
            font-family: 'Segoe UI', sans-serif;
        }
        .success-box {
            text-align: center;
            background: rgba(255,255,255,0.1);
            padding: 40px;
            border-radius: 15px;
            backdrop-filter: blur(10px);
        }
        .checkmark {
            font-size: 4rem;
            color: #00e676;
        }
        .btn-home {
            background: white;
            color: #185a9d;
            font-weight: bold;
            border-radius: 8px;
            margin-top: 15px;
        }
        .btn-home:hover {
            background: #f1f1f1;
        }
    </style>
</head>
<body>

    <div class="success-box">
        <div class="checkmark">✅</div>
        <h2 class="mt-3">Order Placed Successfully!</h2>
        <p>Thank you for shopping with <strong>ZAM ZAM ELECTRONICS</strong>.</p>
        <a href="/" class="btn btn-home">Back to Home</a>
    </div>

</body>
</html>
