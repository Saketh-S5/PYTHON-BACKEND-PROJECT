<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Shopping Cart</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 20px;
            background: #f5f5f5;
        }
        h2 {
            color: #333;
        }
        .cart-container {
            background: #fff;
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 2px 6px rgba(0,0,0,0.1);
            max-width: 600px;
            margin: auto;
        }
        ul {
            list-style: none;
            padding: 0;
        }
        li {
            padding: 10px;
            border-bottom: 1px solid #ddd;
        }
        .total {
            margin-top: 15px;
            font-size: 18px;
            font-weight: bold;
        }
        .btn {
            display: inline-block;
            padding: 10px 15px;
            margin-top: 15px;
            background: #007BFF;
            color: white;
            text-decoration: none;
            border-radius: 5px;
        }
        .btn:hover {
            background: #0056b3;
        }
    </style>
</head>
<body>
    <div class="cart-container">
        <h2>Your Cart</h2>

        {% if cart %}
            <ul>
                {% for item in cart %}
                    <li>
                        {{ item["name"] }} - ₹{{ item["price"] }}
                    </li>
                {% endfor %}
            </ul>
            <p class="total">Total: ₹{{ total }}</p>
            <a class="btn" href="{{ url_for('checkout') }}">Proceed to Checkout</a>
        {% else %}
            <p>Your cart is empty.</p>
            <a class="btn" href="{{ url_for('home') }}">Back to Shop</a>
        {% endif %}
    </div>
</body>
</html>
